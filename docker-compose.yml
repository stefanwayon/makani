services:
  makani:
    image: makani:latest-25.11-x86_64
    user: "${DOCKER_UID:-nobody}:${DOCKER_GID:-nogroup}"
    network_mode: host
    init: true
    stop_signal: SIGINT
    ipc: host
    environment:
      - MASTER_PORT=${MASTER_PORT:-12355}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES}
      - NUMBA_CACHE_DIR=/data/cache/numba
      - TRITON_CACHE_DIR=/data/cache/triton
      - WANDB_DATA_DIR=/data/cache/wandb
      - TORCH_KERNEL_CACHE_PATH=/data/cache/torch_kernels
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CUDA_MODULE_LOADING=LAZY
      - HOME=/home/${USER}
      - NETRC=/netrc
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
    volumes:
      - .:/opt/makani
      - /data:/data
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - /data/cache/home_cache:/home/${USER}/.cache
      - /data/cache/home_local:/home/${USER}/.local
      - /data/cache/torch_kernels:/home/${USER}/.cache/torch/kernels
      - ~/.netrc:/netrc:ro
    working_dir: /opt/makani
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
